<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzinTakip Portal - Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Rounded">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl border border-slate-100 p-8 transition-all duration-300">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-sky-100 text-sky-600 rounded-2xl mb-4">
                <span class="material-icons-rounded text-3xl">shield</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">İzinTakip Portal</h1>
            <p class="text-sm text-slate-500 mt-1" id="page-subtitle">Kurumsal İzin Yönetim Sistemi</p>
        </div>

        <div id="alert-box" class="hidden mb-6 p-4 rounded-xl text-sm font-medium flex items-center gap-3">
            <span class="material-icons-rounded" id="alert-icon">info</span>
            <span id="alert-message"></span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">E-posta Adresi</label>
                <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl focus-within:border-sky-500 focus-within:bg-white transition-all px-4 py-3">
                    <span class="material-icons-rounded text-slate-400 text-xl mr-3 select-none">email</span>
                    <input type="email" id="login-email" required placeholder="name@company.com"
                           class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 p-0 m-0 focus:ring-0">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Giriş Şifresi</label>
                <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl focus-within:border-sky-500 focus-within:bg-white transition-all px-4 py-3">
                    <span class="material-icons-rounded text-slate-400 text-xl mr-3 select-none">lock</span>
                    <input type="password" id="login-password" required placeholder="••••••••"
                           class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 p-0 m-0 focus:ring-0">
                </div>
            </div>

            <button type="submit" id="login-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-slate-800/20 transition-all flex items-center justify-center gap-2 cursor-pointer">
                <span>Sisteme Giriş Yap</span>
                <span class="material-icons-rounded text-lg">login</span>
            </button>

            <div class="text-center pt-4 border-t border-slate-100">
                <button type="button" onclick="toggleForm(true)" class="text-xs font-bold text-sky-600 hover:text-sky-700 transition-all cursor-pointer">
                    Şirket Kurulumu Yapmak mı İstiyorsunuz? Yeni Hesap Oluştur
                </button>
            </div>
        </form>

        <form id="register-form" onsubmit="handleRegister(event)" class="space-y-5 hidden">
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Yönetici Adı Soyadı</label>
                <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl focus-within:border-sky-500 focus-within:bg-white transition-all px-4 py-3">
                    <span class="material-icons-rounded text-slate-400 text-xl mr-3 select-none">person</span>
                    <input type="text" id="reg-name" required placeholder="Emine Baş"
                           class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 p-0 m-0 focus:ring-0">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Yönetici E-posta</label>
                <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl focus-within:border-sky-500 focus-within:bg-white transition-all px-4 py-3">
                    <span class="material-icons-rounded text-slate-400 text-xl mr-3 select-none">email</span>
                    <input type="email" id="reg-email" required placeholder="admin@company.com"
                           class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 p-0 m-0 focus:ring-0">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Güvenli Şifre</label>
                <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl focus-within:border-sky-500 focus-within:bg-white transition-all px-4 py-3">
                    <span class="material-icons-rounded text-slate-400 text-xl mr-3 select-none">lock</span>
                    <input type="password" id="reg-password" required placeholder="••••••••"
                           class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 p-0 m-0 focus:ring-0">
                </div>
            </div>

            <button type="submit" id="register-btn" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-sky-600/20 transition-all flex items-center justify-center gap-2 cursor-pointer">
                <span>Şirket Hesabını Aktif Et</span>
                <span class="material-icons-rounded text-lg">app_registration</span>
            </button>

            <div class="text-center pt-4 border-t border-slate-100">
                <button type="button" onclick="toggleForm(false)" class="text-xs font-bold text-slate-600 hover:text-slate-700 transition-all cursor-pointer">
                    Zaten bir şirket hesabınız var mı? Giriş Yap
                </button>
            </div>
        </form>

    </div>

    <script>
        function toggleForm(showRegister) {
            const loginForm = document.getElementById("login-form");
            const regForm = document.getElementById("register-form");
            const subtitle = document.getElementById("page-subtitle");
            hideAlert();

            if (showRegister) {
                loginForm.classList.add("hidden");
                regForm.classList.remove("hidden");
                subtitle.innerText = "Yeni Şirket ve Yönetici Kaydı";
            } else {
                regForm.classList.add("hidden");
                loginForm.classList.remove("hidden");
                subtitle.innerText = "Kurumsal İzin Yönetim Sistemi";
            }
        }

        function showAlert(message, isSuccess = false) {
            const box = document.getElementById("alert-box");
            const msg = document.getElementById("alert-message");
            const icon = document.getElementById("alert-icon");

            msg.innerText = message;
            box.classList.remove("hidden", "bg-red-50", "text-red-700", "bg-emerald-50", "text-emerald-700");

            if (isSuccess) {
                box.classList.add("bg-emerald-50", "text-emerald-700");
                icon.innerText = "check_circle";
            } else {
                box.classList.add("bg-red-50", "text-red-700");
                icon.innerText = "error";
            }
        }

        function hideAlert() {
            document.getElementById("alert-box").classList.add("hidden");
        }

        async function handleLogin(event) {
            event.preventDefault();
            hideAlert();

            const btn = document.getElementById("login-btn");
            btn.disabled = true;
            btn.innerHTML = `<span>Giriş Yapılıyor...</span>`;

            const payload = {
                email: document.getElementById("login-email").value.trim(),
                password: document.getElementById("login-password").value
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert("Giriş başarılı! Yönlendiriliyorsunuz...", true);
                    sessionStorage.setItem("user_data", JSON.stringify(data));

                    setTimeout(() => {
                        if (data.role === "1") {
                            window.location.href = "admin.html";
                        } else {
                            window.location.href = "personel.html";
                        }
                    }, 1000);
                } else {
                    showAlert(data.message || "Giriş başarısız. Bilgilerinizi kontrol edin.");
                    btn.disabled = false;
                    btn.innerHTML = `<span>Sisteme Giriş Yap</span><span class="material-icons-rounded text-lg">login</span>`;
                }
            } catch (error) {
                showAlert("Sunucu bağlantı hatası oluştu.");
                btn.disabled = false;
                btn.innerHTML = `<span>Sisteme Giriş Yap</span><span class="material-icons-rounded text-lg">login</span>`;
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            hideAlert();

            const btn = document.getElementById("register-btn");
            btn.disabled = true;
            btn.innerHTML = `<span>Şirket Kuruluyor...</span>`;

            const payload = {
                adminName: document.getElementById("reg-name").value.trim(),
                email: document.getElementById("reg-email").value.trim(),
                password: document.getElementById("reg-password").value
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showAlert("Şirket ve admin hesabı başarıyla oluşturuldu! Giriş yapabilirsiniz.", true);
                    setTimeout(() => {
                        toggleForm(false);
                        document.getElementById("login-email").value = payload.email;
                    }, 1500);
                } else {
                    const errorText = await response.text();
                    showAlert(errorText || "Kayıt işlemi sırasında bir hata oluştu.");
                }
            } catch (error) {
                showAlert("Sunucu bağlantı hatası oluştu.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>Şirket Hesabını Aktif Et</span><span class="material-icons-rounded text-lg">app_registration</span>`;
            }
        }
    </script>
</body>
</html>
