<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzinPort - Kurumsal İzin Yönetim Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 bg-[url('login-bg.png')] bg-cover bg-center bg-no-repeat antialiased overflow-x-hidden">

    <div class="w-full max-w-md bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl border border-white/20 p-8 md:p-10 transition-all duration-300">

        <div class="text-center mb-8">
            <div class="inline-block mb-3">
                <img src="logo.png" alt="İzinPort Logo" class="h-16 w-auto object-contain mx-auto">
            </div>
            <h1 class="text-3xl font-bold text-[#0b1329] tracking-tight">İzinPort</h1>
            <p class="text-sm font-semibold text-slate-500 mt-2 tracking-wide uppercase" id="page-subtitle">Giriş Yapın</p>
        </div>

        <div id="alert-box" class="hidden p-4 rounded-xl text-sm font-medium flex items-center gap-3 transition-all duration-300 border mb-6">
            <span id="alert-message"></span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">E-Posta Adresi</label>
                <div class="flex items-center bg-white/80 border border-slate-200 rounded-xl focus-within:border-sky-500 focus-within:ring-4 focus-within:ring-sky-500/10 transition-all px-4 py-3.5 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                    <input type="email" id="login-email" required placeholder="ornek@mail.com"
                           class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 p-0 m-0 focus:ring-0 font-medium text-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Personel / Yönetici Şifresi</label>
                <div class="flex items-center bg-white/80 border border-slate-200 rounded-xl focus-within:border-sky-500 focus-within:ring-4 focus-within:ring-sky-500/10 transition-all px-4 py-3.5 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                    <input type="password" id="login-password" required placeholder="••••••••"
                           class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 p-0 m-0 focus:ring-0 font-medium text-sm">
                </div>
            </div>

            <button type="submit" id="login-btn" class="w-full bg-[#1e3a8a] hover:bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/10 transition-all flex items-center justify-center gap-2 cursor-pointer text-sm tracking-wide uppercase">
                <span>Giriş Yap</span>
            </button>

            <div class="text-center pt-4 border-t border-slate-100 flex justify-center gap-6">
                <button type="button" onclick="openForgotModal()" class="text-xs font-semibold text-slate-400 hover:text-slate-600 transition-all cursor-pointer">Şifremi Unuttum?</button>
                <button type="button" onclick="toggleForm(true)" class="text-xs font-bold text-sky-600 hover:text-sky-700 transition-all cursor-pointer">Yeni Yönetici Kaydı</button>
            </div>
        </form>

        <form id="register-form" onsubmit="handleRegister(event)" class="space-y-5 hidden">
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Yönetici Adı Soyadı</label>
                <div class="flex items-center bg-white/80 border border-slate-200 rounded-xl focus-within:border-sky-500 focus-within:ring-4 focus-within:ring-sky-500/10 transition-all px-4 py-3.5 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    <input type="text" id="reg-name" required placeholder="Örn. Emine Baş"
                           class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 p-0 m-0 focus:ring-0 font-medium text-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Yönetici E-posta</label>
                <div class="flex items-center bg-white/80 border border-slate-200 rounded-xl focus-within:border-sky-500 focus-within:ring-4 focus-within:ring-sky-500/10 transition-all px-4 py-3.5 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                    <input type="email" id="reg-email" required placeholder="ornek@mail.com"
                           class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 p-0 m-0 focus:ring-0 font-medium text-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Güvenli Şifre</label>
                <div class="flex items-center bg-white/80 border border-slate-200 rounded-xl focus-within:border-sky-500 focus-within:ring-4 focus-within:ring-sky-500/10 transition-all px-4 py-3.5 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                    <input type="password" id="reg-password" required placeholder="••••••••"
                           class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 p-0 m-0 focus:ring-0 font-medium text-sm">
                </div>
            </div>

            <button type="submit" id="register-btn" class="w-full bg-[#1e3a8a] hover:bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/10 transition-all flex items-center justify-center gap-2 cursor-pointer text-sm tracking-wide uppercase">
                <span>Yönetici Kaydı Oluştur</span>
            </button>

            <div class="text-center pt-4 border-t border-slate-100">
                <button type="button" onclick="toggleForm(false)" class="text-xs font-bold text-slate-500 hover:text-slate-700 transition-all cursor-pointer">
                    Zaten bir şirket hesabınız var mı? Giriş Yap
                </button>
            </div>
        </form>

    </div>

    <!-- ŞİFRE YENİLEME MODALI -->
    <div id="forgot-modal" class="hidden fixed inset-0 bg-[#0b1329]/60 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 border border-slate-100 space-y-6 relative">
            <button onclick="closeForgotModal()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-600 font-semibold text-lg cursor-pointer">&times;</button>

            <div class="text-center">
                <h3 class="text-xl font-bold text-[#0b1329]">Şifre Yenileme</h3>
                <p class="text-xs text-slate-400 mt-1">Lütfen adımları takip ederek şifrenizi yenileyiniz.</p>
            </div>

            <div id="forgot-alert-box" class="hidden p-4 rounded-xl text-sm font-medium border">
                <span id="forgot-alert-message"></span>
            </div>

            <!-- ADIM 1: E-POSTA GİRİŞİ -->
            <div id="forgot-step-1" class="space-y-4">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">E-Posta Adresiniz</label>
                    <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                        <input type="email" id="forgot-email" placeholder="ornek@mail.com" class="w-full bg-transparent border-none outline-none text-slate-700 text-sm focus:ring-0 font-medium">
                    </div>
                </div>
                <button type="button" onclick="sendVerificationCode()" id="forgot-btn-send" class="w-full bg-[#1e3a8a] hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl transition-all text-sm uppercase tracking-wide cursor-pointer">
                    Doğrulama Kodu Gönder
                </button>
            </div>

            <!-- ADIM 2: DOĞRULAMA KODU VE DÜZENLENEN TEMİZ SAYAÇ ALANI -->
            <div id="forgot-step-2" class="space-y-4 hidden">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">E-Posta Doğrulama Kodu</label>
                    <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                        <input type="text" id="forgot-code" placeholder="123456" maxlength="6" class="w-full bg-transparent border-none outline-none text-slate-700 text-sm focus:ring-0 font-bold tracking-widest text-center">
                    </div>
                </div>

                <button type="button" onclick="verifyCode()" id="forgot-btn-verify" class="w-full bg-[#1e3a8a] hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl transition-all text-sm uppercase tracking-wide cursor-pointer">
                    Kodu Doğrula
                </button>

                <!-- ŞIK VE TEMİZ KOD TEKRAR İSTEME / SAYAÇ YAZISI -->
                <div class="text-center pt-1">
                    <span id="timer-status" class="text-xs font-medium text-slate-400">
                        Kalan Süre: <strong id="timer-text" class="text-slate-700 font-bold">01:00</strong>
                    </span>
                    <button type="button" id="forgot-btn-resend" onclick="sendVerificationCode()" class="hidden text-xs font-bold text-sky-600 hover:text-sky-700 hover:underline transition-all cursor-pointer">
                        Süre Doldu - Yeni Kod Al
                    </button>
                </div>
            </div>

            <!-- ADIM 3: YENİ ŞİFRE -->
            <div id="forgot-step-3" class="space-y-4 hidden">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Yeni Şifre</label>
                    <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        <input type="password" id="forgot-new-password" placeholder="••••••••" class="w-full bg-transparent border-none outline-none text-slate-700 text-sm focus:ring-0 font-medium">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Yeni Şifre Tekrar</label>
                    <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        <input type="password" id="forgot-new-password-confirm" placeholder="••••••••" class="w-full bg-transparent border-none outline-none text-slate-700 text-sm focus:ring-0 font-medium">
                    </div>
                </div>
                <button type="button" onclick="updatePassword()" id="forgot-btn-update" class="w-full bg-[#1e3a8a] hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl transition-all text-sm uppercase tracking-wide cursor-pointer">
                    Şifreyi Güncelle
                </button>
            </div>
        </div>
    </div>

    <script>
        let timerInterval = null;
        let timeLeft = 60; // Test İçin 60 Saniye (1 Dakika)

        /* OTO-YÖNLENDİRME METODU (İK İÇİN ROLE "2" DESTEĞİ EKLENDİ) */
        document.addEventListener("DOMContentLoaded", () => {
            const sessionData = localStorage.getItem("user_data");
            if (sessionData) {
                const data = JSON.parse(sessionData);
                const role = data.role || data.Role;
                if (role === "1") {
                    window.location.href = "admin.html";
                } else if (role === "2") {
                    window.location.href = "ik.html";
                } else {
                    window.location.href = "personel.html";
                }
            }
        });

        function toggleForm(showRegister) {
            const loginForm = document.getElementById("login-form");
            const regForm = document.getElementById("register-form");
            const subtitle = document.getElementById("page-subtitle");
            hideAlert();

            if (showRegister) {
                loginForm.classList.add("hidden");
                regForm.classList.remove("hidden");
                subtitle.innerText = "Yeni Hesap Oluşturun";
            } else {
                regForm.classList.add("hidden");
                loginForm.classList.remove("hidden");
                subtitle.innerText = "Giriş Yapın";
            }
        }

        function showAlert(message, isSuccess = false) {
            const box = document.getElementById("alert-box");
            const msg = document.getElementById("alert-message");

            msg.innerText = message;
            box.classList.remove("hidden", "bg-red-50", "text-red-700", "border-red-100", "bg-emerald-50", "text-emerald-700", "border-emerald-100");

            if (isSuccess) {
                box.classList.add("bg-emerald-50", "text-emerald-700", "border-emerald-100");
            } else {
                box.classList.add("bg-red-50", "text-red-700", "border-red-100");
            }
        }

        function hideAlert() {
            document.getElementById("alert-box").classList.add("hidden");
        }

        function openForgotModal() {
            document.getElementById("forgot-modal").classList.remove("hidden");
            showForgotStep(1);
            hideForgotAlert();
            stopTimer();
            document.getElementById("forgot-email").value = "";
            document.getElementById("forgot-code").value = "";
            document.getElementById("forgot-new-password").value = "";
            document.getElementById("forgot-new-password-confirm").value = "";
        }

        function closeForgotModal() {
            document.getElementById("forgot-modal").classList.add("hidden");
            stopTimer();
        }

        function showForgotStep(stepNum) {
            document.getElementById("forgot-step-1").classList.add("hidden");
            document.getElementById("forgot-step-2").classList.add("hidden");
            document.getElementById("forgot-step-3").classList.add("hidden");
            document.getElementById(`forgot-step-${stepNum}`).classList.remove("hidden");
        }

        function showForgotAlert(message, isSuccess = false) {
            const box = document.getElementById("forgot-alert-box");
            const msg = document.getElementById("forgot-alert-message");
            msg.innerText = message;
            box.classList.remove("hidden", "bg-red-50", "text-red-700", "border-red-100", "bg-emerald-50", "text-emerald-700", "border-emerald-100");
            if (isSuccess) {
                box.classList.add("bg-emerald-50", "text-emerald-700", "border-emerald-100");
            } else {
                box.classList.add("bg-red-50", "text-red-700", "border-red-100");
            }
        }

        function hideForgotAlert() {
            document.getElementById("forgot-alert-box").classList.add("hidden");
        }

        /* 60 SANİYELİK DÜZENLENMİŞ SAYAÇ MANTIĞI */
        function startTimer() {
            stopTimer();
            timeLeft = 60; // 60 Saniye
            const timerStatus = document.getElementById("timer-status");
            const timerText = document.getElementById("timer-text");
            const resendBtn = document.getElementById("forgot-btn-resend");
            const verifyBtn = document.getElementById("forgot-btn-verify");
            const codeInput = document.getElementById("forgot-code");

            timerStatus.classList.remove("hidden");
            resendBtn.classList.add("hidden");
            verifyBtn.disabled = false;
            codeInput.disabled = false;

            timerInterval = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;

                const formattedMin = String(minutes).padStart(2, '0');
                const formattedSec = String(seconds).padStart(2, '0');

                timerText.innerText = `${formattedMin}:${formattedSec}`;

                if (timeLeft <= 0) {
                    stopTimer();
                    timerStatus.classList.add("hidden");
                    resendBtn.classList.remove("hidden");
                    verifyBtn.disabled = true;
                    codeInput.disabled = true;
                    showForgotAlert("Doğrulama kodunun süresi doldu! Lütfen yeni kod alın.");
                }
                timeLeft--;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        async function sendVerificationCode() {
            hideForgotAlert();
            const email = document.getElementById("forgot-email").value.trim();
            if (!email) { showForgotAlert("Lütfen e-posta adresinizi girin."); return; }

            const btn = document.getElementById("forgot-btn-send");

            btn.disabled = true; btn.innerText = "Kod Gönderiliyor...";

            try {
                const response = await fetch('/api/auth/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                if (response.ok) {
                    showForgotAlert("Doğrulama kodu e-postanıza gönderildi!", true);
                    setTimeout(() => {
                        hideForgotAlert();
                        showForgotStep(2);
                        startTimer(); // Sayacı Başlat
                    }, 1000);
                } else {
                    const errorText = await response.text();
                    showForgotAlert(errorText || "E-posta gönderilemedi.");
                }
            } catch (error) {
                showForgotAlert("Bağlantı hatası.");
            } finally {
                btn.disabled = false; btn.innerText = "Doğrulama Kodu Gönder";
            }
        }

        async function verifyCode() {
            hideForgotAlert();
            const email = document.getElementById("forgot-email").value.trim();
            const code = document.getElementById("forgot-code").value.trim();
            if (!code) { showForgotAlert("Lütfen kodu girin."); return; }

            const btn = document.getElementById("forgot-btn-verify");
            btn.disabled = true; btn.innerText = "Kod Doğrulanıyor...";

            try {
                const response = await fetch('/api/auth/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, code: code })
                });

                if (response.ok) {
                    stopTimer(); // Doğrulama başarılı olunca sayacı durdur
                    showForgotAlert("Kod doğrulandı! Yeni şifrenizi belirleyin.", true);
                    setTimeout(() => { hideForgotAlert(); showForgotStep(3); }, 1500);
                } else {
                    showForgotAlert("Doğrulama kodu hatalı veya kullanım süresi dolmuş. Lütfen kodu kontrol edin ya da yeni bir kod talep edin.");
                }
            } catch (error) {
                showForgotAlert("Bağlantı hatası.");
            } finally {
                btn.disabled = false; btn.innerText = "Kodu Doğrula";
            }
        }

        async function updatePassword() {
            hideForgotAlert();
            const email = document.getElementById("forgot-email").value.trim();
            const code = document.getElementById("forgot-code").value.trim();
            const password = document.getElementById("forgot-new-password").value;
            const confirm = document.getElementById("forgot-new-password-confirm").value;

            if (!password || !confirm) { showForgotAlert("Lütfen tüm alanları doldurun."); return; }
            if (password !== confirm) { showForgotAlert("Şifreler uyuşmuyor!"); return; }

            const btn = document.getElementById("forgot-btn-update");
            btn.disabled = true; btn.innerText = "Şifre Güncelleniyor...";

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, code: code, newPassword: password })
                });

                if (response.ok) {
                    showForgotAlert("Şifreniz başarıyla güncellendi!", true);
                    setTimeout(() => {
                        closeForgotModal();
                        document.getElementById("login-email").value = email;
                    }, 1500);
                } else {
                    const errorText = await response.text();
                    showForgotAlert(errorText || "Şifre güncellenemedi.");
                }
            } catch (error) {
                showForgotAlert("Bağlantı hatası.");
            } finally {
                btn.disabled = false; btn.innerText = "Şifreyi Güncelle";
            }
        }

        /* GİRİŞ İŞLEMİ (ROLE === "2" İÇİN IK.HTML YÖNLENDİRMESİ EKLENDİ) */
        async function handleLogin(event) {
            event.preventDefault();
            hideAlert();

            const btn = document.getElementById("login-btn");
            btn.disabled = true;
            btn.innerHTML = `<span>Giriş Yapıyor...</span>`;

            const payload = {
                email: document.getElementById("login-email").value.trim(),
                password: document.getElementById("login-password").value
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    showAlert("Giriş başarılı! Yönlendiriliyorsunuz...", true);

                    localStorage.setItem("user_data", JSON.stringify(data));

                    const role = data.role || data.Role;

                    setTimeout(() => {
                        if (role === "1") {
                            window.location.href = "admin.html";
                        } else if (role === "2") {
                            window.location.href = "ik.html";
                        } else {
                            window.location.href = "personel.html";
                        }
                    }, 1000);
                } else {
                    let errorMessage = "Giriş başarısız. Bilgilerinizi kontrol edin.";
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.message || errorMessage;
                    } catch (e) {
                        const errorText = await response.text();
                        if (errorText) errorMessage = errorText;
                    }
                    showAlert(errorMessage);
                    btn.disabled = false;
                    btn.innerHTML = `<span>Giriş Yap</span>`;
                }
            } catch (error) {
                showAlert("Sunucu bağlantı hatası oluştu.");
                btn.disabled = false;
                btn.innerHTML = `<span>Giriş Yap</span>`;
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            hideAlert();

            const btn = document.getElementById("register-btn");
            btn.disabled = true;
            btn.innerHTML = `<span>Kayıt Yapılıyor...</span>`;

            const payload = {
                adminName: document.getElementById("reg-name").value.trim(),
                email: document.getElementById("reg-email").value.trim(),
                password: document.getElementById("reg-password").value
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showAlert("Şirket ve admin hesabı başarıyla oluşturuldu! Giriş yapabilirsiniz.", true);
                    setTimeout(() => {
                        toggleForm(false);
                        document.getElementById("login-email").value = payload.email;
                    }, 1500);
                } else {
                    const errorText = await response.text();
                    showAlert(errorText || "Kayıt işlemi sırasında bir hata oluştu.");
                }
            } catch (error) {
                showAlert("Sunucu bağlantı hatası oluştu.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>Yönetici Kaydı Oluştur</span>`;
            }
        }
    </script>
</body>
